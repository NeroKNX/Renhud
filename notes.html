<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REN — workspace</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f1018; color: #e5e5e5; font-family: 'JetBrains Mono', 'Courier New', monospace; min-height: 100vh; display: flex; }
.sidebar { width: 260px; background: #0a0d14; border-right: 1px solid #1e2238; padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar h1 { font-size: 13px; color: #4f46e5; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
.file-list { list-style: none; }
.file-list li { padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; color: #9ca3af; transition: all 0.2s; margin-bottom: 2px; }
.file-list li:hover { background: #16192a; color: #e5e5e5; }
.file-list li.active { background: #1e2238; color: #6366f1; }
.file-list li .meta { font-size: 10px; color: #4b5563; margin-top: 2px; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.header { padding: 16px 24px; border-bottom: 1px solid #1e2238; font-size: 14px; color: #9ca3af; display: flex; align-items: center; gap: 12px; }
.header .badge { font-size: 10px; background: #1e2238; color: #4f46e5; padding: 2px 8px; border-radius: 10px; }
.content { flex: 1; padding: 24px; overflow-y: auto; line-height: 1.7; font-size: 14px; }
.content pre { background: #0a0d14; border: 1px solid #1e2238; border-radius: 8px; padding: 16px; overflow-x: auto; font-size: 13px; margin: 12px 0; }
.content code { background: #1e2238; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
.content h1 { font-size: 22px; color: #6366f1; margin: 24px 0 12px; }
.content h2 { font-size: 17px; color: #818cf8; margin: 20px 0 10px; border-bottom: 1px solid #1e2238; padding-bottom: 6px; }
.content h3 { font-size: 15px; color: #a5b4fc; margin: 16px 0 8px; }
.content p { margin: 8px 0; }
.content ul, .content ol { margin: 8px 0; padding-left: 24px; }
.content li { margin: 4px 0; }
.content hr { border: none; border-top: 1px solid #1e2238; margin: 24px 0; }
.content em { color: #a78bfa; }
.content strong { color: #c4b5fd; }
.content blockquote { border-left: 3px solid #4f46e5; padding-left: 16px; color: #9ca3af; margin: 12px 0; }
.content table { border-collapse: collapse; margin: 12px 0; width: 100%; }
.content th, .content td { border: 1px solid #1e2238; padding: 8px 12px; text-align: left; font-size: 13px; }
.content th { background: #1e2238; color: #6366f1; }
.empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #4b5563; font-size: 14px; flex-direction: column; gap: 8px; }
.empty-state .icon { font-size: 32px; }
.loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #4b5563; }
.error { display: flex; align-items: center; justify-content: center; height: 100%; color: #ef4444; flex-direction: column; gap: 8px; }
.back-link { color: #4f46e5; text-decoration: none; font-size: 12px; margin-top: auto; padding-top: 20px; }
.back-link:hover { color: #818cf8; }
@media (max-width: 640px) { .sidebar { width: 200px; } .content { padding: 16px; font-size: 13px; } }
</style>
</head>
<body>
<div class="sidebar">
<h1>📄 Workspace</h1>
<ul class="file-list" id="fileList"></ul>
<a class="back-link" href="/">← Volver al chat</a>
</div>
<div class="main">
<div class="header" id="header">REN — notas internas</div>
<div class="content" id="content">
<div class="empty-state">
<div class="icon">📝</div>
<div>Seleccioná un archivo para verlo.</div>
</div>
</div>
</div>
<script>
// Obtener user_id del login
function getUserId() {
  try {
    const u = JSON.parse(localStorage.getItem('ren_user') || '{}');
    return u.user_id || '';
  } catch { return ''; }
}
const USER_ID = getUserId();

function renderMarkdown(text) {
  let html = text
    .replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^>\s?(.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^\- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/(?:^|\n)\|(.+)\|(?:\n|$)/gm, (m) => {
      const rows = m.trim().split('\n').filter(r => r.trim());
      if (rows.length < 2) return m;
      const headers = rows[0].split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
      const body = rows.slice(2).map(r => {
        const cells = r.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
        return `<tr>${cells}</tr>`;
      }).join('');
      return `<table><thead><tr>${headers}</tr></thead><tbody>${body}</tbody></table>`;
    })
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

async function loadFileList() {
  try {
    const res = await fetch('/api/workspace?user_id=' + USER_ID);
    const data = await res.json();
    const list = document.getElementById('fileList');
    list.innerHTML = '';
    for (const f of data.files) {
      const li = document.createElement('li');
      const date = new Date(f.modified).toLocaleString('es-CO', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      li.innerHTML = `📄 ${f.name}<div class="meta">${date} · ${f.size < 1024 ? f.size + 'B' : (f.size/1024).toFixed(1) + 'KB'}</div>`;
      li.dataset.file = f.name;
      li.onclick = () => loadFile(f.name);
      list.appendChild(li);
    }
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="error">Error al cargar archivos: ${e.message}</div>`;
  }
}

async function loadFile(name) {
  const content = document.getElementById('content');
  const header = document.getElementById('header');
  content.innerHTML = '<div class="loading">Cargando...</div>';
  document.querySelectorAll('.file-list li').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-file="${name}"]`)?.classList.add('active');
  try {
    const res = await fetch(`/api/workspace/${encodeURIComponent(name)}?user_id=${USER_ID}`);
    const data = await res.json();
    header.textContent = `📄 ${data.name}`;
    content.innerHTML = renderMarkdown(data.content);
  } catch(e) {
    content.innerHTML = `<div class="error">Error al cargar: ${e.message}</div>`;
  }
}

if (USER_ID && USER_ID === "nero") {
  loadFileList();
  setTimeout(() => {
    const ides = document.querySelector('[data-file="IDES.md"]');
    const first = document.querySelector('.file-list li');
    if (ides) ides.click();
    else if (first) first.click();
  }, 200);
} else if (USER_ID && USER_ID !== "nero") {
  window.location.href = "/";
} else {
  window.location.href = "/#/login";
}
</script>
</body>
</html>
